{% extends "base.html" %}

{% block title %}
Add Movie
{% endblock %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">➕ Add New Movie</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Genre</label>
                <input type="text" name="genre" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Year</label>
                <input type="number" name="year" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Rating</label>
                <input type="number" step="0.1" name="rating" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Runtime</label>
                <input type="text" name="runtime" class="form-control">
            </div>

            <div class="col-md-3 mb-3">
                <label>Language</label>
                <input type="text" name="language" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Movie Poster</label>
                <input type="file" name="poster" class="form-control" accept=".jpg,.jpeg,.png,.webp" >
            </div>

            <div class="col-md-6 mb-3">
                <label>Backdrop Filename</label>
                <input type="text" name="backdrop" class="form-control" placeholder="example-bg.jpg">
            </div>

            <div class="col-12 mb-3">
                <label>Director</label>
                <input type="text" name="director" class="form-control">
            </div>

            <div class="col-12 mb-3">
                <label>Trailer URL</label>
                <input type="text" name="trailer" class="form-control">
            </div>

            <div class="col-12 mb-3">
                <label>Description</label>
                <textarea
                    name="description"
                    rows="5"
                    class="form-control"></textarea>
            </div>

        </div>

        <button class="btn btn-danger">

            Save Movie

        </button>

    </form>

</div>

{% endblock %}

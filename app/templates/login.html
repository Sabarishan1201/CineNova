{% extends "base.html" %}

{% block title %}
Login | CineNova
{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card bg-dark text-white shadow-lg border-0 rounded-4 p-4">

                <h2 class="text-center mb-4">
                    Welcome Back
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-danger w-100">

                        Login

                    </button>

                </form>

                <p class="text-center mt-4">

                    Don't have an account?

                    <a href="{{ url_for('register') }}"
                       class="text-danger text-decoration-none">

                        Register

                    </a>

                </p>

            </div>

        </div>

    </div>

</section>

{% endblock %}

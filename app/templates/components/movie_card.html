<div class="movie-card">

    <div class="movie-poster">

        {% if movie.poster %}

            <img
                src="{{ url_for('static', filename='images/movies/' + movie.poster) }}"
                alt="{{ movie.title }}">

        {% else %}

            <div class="poster-placeholder">
                🎬
            </div>

        {% endif %}

    </div>

    <div class="movie-content">

        <span class="rating">
            ⭐ {{ movie.rating }}
        </span>

        <h4>
            {{ movie.title }}
        </h4>

        <p>
            {{ movie.genre }} • {{ movie.year }}
        </p>

        <a
            href="{{ url_for('movie_details', title=movie.title) }}"
            class="cine-btn">

            View Details

        </a>

    </div>

</div>

{% extends "base.html" %}

{% block title %}
Edit Movie | CineNova
{% endblock %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4 text-danger">
        ✏ Edit Movie
    </h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="row">

            <!-- Title -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Title</label>
                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ movie.title }}"
                    required>
            </div>

            <!-- Genre -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Genre</label>
                <input
                    type="text"
                    name="genre"
                    class="form-control"
                    value="{{ movie.genre }}"
                    required>
            </div>

            <!-- Year -->
            <div class="col-md-3 mb-3">
                <label class="form-label">Year</label>
                <input
                    type="number"
                    name="year"
                    class="form-control"
                    value="{{ movie.year }}"
                    required>
            </div>

            <!-- Rating -->
            <div class="col-md-3 mb-3">
                <label class="form-label">Rating</label>
                <input
                    type="number"
                    step="0.1"
                    name="rating"
                    class="form-control"
                    value="{{ movie.rating }}"
                    required>
            </div>

            <!-- Runtime -->
            <div class="col-md-3 mb-3">
                <label class="form-label">Runtime</label>
                <input
                    type="text"
                    name="runtime"
                    class="form-control"
                    value="{{ movie.runtime }}">
            </div>

            <!-- Language -->
            <div class="col-md-3 mb-3">
                <label class="form-label">Language</label>
                <input
                    type="text"
                    name="language"
                    class="form-control"
                    value="{{ movie.language }}">
            </div>

            <!-- Poster Upload -->
            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Movie Poster
                </label>

                <input
                    type="file"
                    name="poster"
                    class="form-control"
                    accept=".jpg,.jpeg,.png,.webp">

                {% if movie.poster %}

                <div class="mt-3">

                    <p class="mb-2">
                        Current Poster
                    </p>

                    <img
                        src="{{ url_for('static', filename='images/movies/' + movie.poster) }}"
                        class="img-fluid rounded shadow"
                        style="max-width:200px;">

                </div>

                {% endif %}

            </div>

            <!-- Backdrop -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Backdrop Filename</label>
                <input
                    type="text"
                    name="backdrop"
                    class="form-control"
                    value="{{ movie.backdrop }}">
            </div>

            <!-- Director -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Director</label>
                <input
                    type="text"
                    name="director"
                    class="form-control"
                    value="{{ movie.director }}">
            </div>

            <!-- Trailer -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Trailer (YouTube Video ID)</label>
                <input
                    type="text"
                    name="trailer"
                    class="form-control"
                    value="{{ movie.trailer }}">
            </div>

            <!-- Description -->
            <div class="col-12 mb-4">
                <label class="form-label">Description</label>
                <textarea
                    name="description"
                    rows="6"
                    class="form-control"
                    required>{{ movie.description }}</textarea>
            </div>

        </div>

        <button
            type="submit"
            class="btn btn-warning btn-lg">

            💾 Update Movie

        </button>

        <a
            href="{{ url_for('admin') }}"
            class="btn btn-secondary btn-lg ms-2">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
